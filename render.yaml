databases:
  - name: ristak-db
    databaseName: ristak_production
    plan: basic-256mb  # Plan de pago básico ($7/mes) - 256MB RAM
    diskSizeGB: 1  # Tamaño de disco: 1GB (mínimo, más barato)
    ipAllowList: []  # Requerido para planes de pago ([] = permitir todas las IPs)
    region: oregon

services:
  # Web Service Principal
  - type: web
    name: ristak-app
    runtime: node
    region: oregon
    plan: starter  # Plan de pago básico ($7/mes) - Mejor uptime y rendimiento que free tier
    buildCommand: npm install --prefix backend && npm install --include=dev --prefix frontend && NODE_ENV=production npm run build --prefix frontend
    # Force rebuild: 2025-10-18-fix-formatDate
    startCommand: npm start --prefix backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: ristak-db
          property: connectionString
      - key: APP_URL
        value: https://ristak-app.onrender.com
      - key: RENDER_EXTERNAL_URL
        value: https://ristak-app.onrender.com
      - key: ENCRYPTION_MASTER_KEY
        sync: false  # SECRETO - Configurar manualmente en Render Dashboard
    healthCheckPath: /api/health
    autoDeploy: true
