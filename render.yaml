services:
  - type: web
    name: ristak-app
    env: node
    region: oregon
    buildCommand: |
      (cd backend && npm ci --no-audit --no-fund) &&
      rm -rf frontend/node_modules frontend/.vite frontend/dist &&
      (cd frontend && npm ci --include=dev --include=optional --foreground-scripts --no-audit --no-fund) &&
      echo "VITE_API_URL=https://$RENDER_EXTERNAL_HOSTNAME" > frontend/.env.production &&
      NODE_ENV=production npm run build --prefix frontend
    startCommand: npm start --prefix backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ristak-db
          property: connectionString

databases:
  - name: ristak-db
    databaseName: ristak_db
    user: ristak_user
    plan: basic-256mb
    # Do not set diskSizeGB here. Render treats it as desired state and
    # fails Blueprint sync if an existing database was manually grown above it.
    storageAutoscalingEnabled: true
