services:
  - type: web
    name: ristak-app
    env: node
    region: oregon
    buildCommand: |
      (cd backend && npm ci --no-audit --no-fund) &&
      rm -rf frontend/node_modules frontend/.vite frontend/dist &&
      (cd frontend && npm ci --include=dev --include=optional --foreground-scripts --no-audit --no-fund) &&
      echo "VITE_API_URL=https://$RENDER_EXTERNAL_HOSTNAME" > frontend/.env.production &&
      NODE_ENV=production npm run build --prefix frontend
    startCommand: npm start --prefix backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: UTC
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ristak-db
          property: connectionString
      - key: MEDIA_STORAGE_PROVIDER
        value: bunny
      - key: MEDIA_COMPRESSION_ENABLED
        value: "true"
      - key: DEFAULT_STORAGE_QUOTA_GB
        value: "5"
      - key: BUNNY_STORAGE_ZONE
        sync: false
      - key: BUNNY_STORAGE_REGION
        sync: false
      - key: BUNNY_STORAGE_ENDPOINT
        sync: false
      - key: BUNNY_STORAGE_API_KEY
        sync: false
      - key: BUNNY_CDN_BASE_URL
        sync: false
      - key: BUNNY_STREAM_LIBRARY_ID
        sync: false
      - key: BUNNY_STREAM_API_KEY
        sync: false
      - key: INTERNAL_INSTALLER_TOKEN
        sync: false

databases:
  - name: ristak-db
    databaseName: ristak_db
    user: ristak_user
    plan: basic-256mb
    diskSizeGB: 1
    storageAutoscalingEnabled: true
