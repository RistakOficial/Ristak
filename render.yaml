services:
  - type: web
    name: ristak-app
    env: node
    region: oregon
    maxShutdownDelaySeconds: 300
    buildCommand: |
      (cd backend && npm ci --no-audit --no-fund) &&
      rm -rf frontend/node_modules frontend/.vite frontend/dist &&
      (cd frontend && npm ci --include=dev --include=optional --foreground-scripts --no-audit --no-fund) &&
      echo "VITE_API_URL=https://$RENDER_EXTERNAL_HOSTNAME" > frontend/.env.production &&
      NODE_ENV=production npm run build --prefix frontend
    startCommand: npm start --prefix backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: UTC
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ristak-db
          property: connectionString
      - key: MEDIA_STORAGE_PROVIDER
        value: bunny
      - key: MEDIA_COMPRESSION_ENABLED
        value: "true"
      - key: GRACEFUL_SHUTDOWN_TIMEOUT_MS
        value: "295000"
      - key: DEFAULT_STORAGE_QUOTA_GB
        value: "5"
      - key: MEDIA_STORAGE_REQUIRE_BUNNY
        value: "true"
      - key: BUNNY_STREAM_COLLECTION_NAME
        value: Ristak Sites & Forms

databases:
  - name: ristak-db
    databaseName: ristak_db
    user: ristak_user
    plan: basic-256mb
    diskSizeGB: 1
    storageAutoscalingEnabled: true
