# Genera builds móviles sólo bajo demanda. No corre en push para evitar subir
# builds innecesarios a App Store Connect o Google Play.
name: mobile-store-release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Tienda/plataforma a preparar
        required: true
        default: ios
        type: choice
        options:
          - ios
          - android
          - both
      submit_for_review:
        description: Pedir revision al terminar la subida
        required: true
        default: false
        type: boolean
      ios_version:
        description: Version visible para App Store
        required: true
        default: "1.0"
        type: string
      android_version_name:
        description: Version visible para Play Store
        required: true
        default: "1.0"
        type: string
      android_track:
        description: Track de Google Play
        required: true
        default: internal
        type: choice
        options:
          - internal
          - closed
          - production
      installer_url:
        description: URL publica del Installer que entrega credenciales temporales
        required: true
        type: string
      mobile_release_token:
        description: Token temporal generado por Ristak Installer
        required: true
        type: string

env:
  APP_BUNDLE_ID: com.ristak.app
  APPLE_TEAM_ID: Y2L8669JNL

jobs:
  ios:
    name: iOS App Store
    if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both' }}
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Fetch iOS store credentials
        env:
          INSTALLER_URL: ${{ github.event.inputs.installer_url }}
        run: |
          MOBILE_RELEASE_TOKEN="$(jq -r '.inputs.mobile_release_token // empty' "$GITHUB_EVENT_PATH")"
          echo "::add-mask::$MOBILE_RELEASE_TOKEN"
          test -n "$INSTALLER_URL"
          test -n "$MOBILE_RELEASE_TOKEN"
          curl --fail-with-body -sS -X POST "${INSTALLER_URL%/}/api/webhooks/mobile-release/credentials" \
            -H "Content-Type: application/json" \
            -H "x-mobile-release-token: $MOBILE_RELEASE_TOKEN" \
            -d '{"platform":"ios"}' \
            > "$RUNNER_TEMP/mobile-ios-credentials.json"

      - name: Prepare App Store Connect API key
        run: |
          CREDS="$RUNNER_TEMP/mobile-ios-credentials.json"
          ASC_KEY_ID="$(jq -r '.credentials.app_store_connect_api_key_id' "$CREDS")"
          ASC_ISSUER_ID="$(jq -r '.credentials.app_store_connect_issuer_id' "$CREDS")"
          ASC_KEY_P8="$(jq -r '.credentials.app_store_connect_api_key_p8' "$CREDS")"
          test -n "$ASC_KEY_ID"
          test -n "$ASC_ISSUER_ID"
          test -n "$ASC_KEY_P8"
          mkdir -p "$RUNNER_TEMP/appstore"
          ASC_KEY_PATH="$RUNNER_TEMP/appstore/AuthKey_${ASC_KEY_ID}.p8"
          printf '%s' "$ASC_KEY_P8" > "$ASC_KEY_PATH"
          export ASC_KEY_ID ASC_ISSUER_ID ASC_KEY_P8 ASC_KEY_PATH
          python3 - <<'PY'
          import json
          import os

          payload = {
              "key_id": os.environ["ASC_KEY_ID"],
              "issuer_id": os.environ["ASC_ISSUER_ID"],
              "key": os.environ["ASC_KEY_P8"],
              "key_filepath": os.environ["ASC_KEY_PATH"],
              "duration": 1200,
              "in_house": False,
          }
          with open(os.path.join(os.environ["RUNNER_TEMP"], "appstore", "api_key.json"), "w") as file:
              json.dump(payload, file)
          PY
          {
            echo "ASC_KEY_ID=$ASC_KEY_ID"
            echo "ASC_ISSUER_ID=$ASC_ISSUER_ID"
            echo "ASC_KEY_PATH=$ASC_KEY_PATH"
          } >> "$GITHUB_ENV"

      - name: Install signing certificate and provisioning profile
        run: |
          CREDS="$RUNNER_TEMP/mobile-ios-credentials.json"
          IOS_CERTIFICATE_BASE64="$(jq -r '.credentials.ios_distribution_certificate_base64 // empty' "$CREDS")"
          IOS_CERTIFICATE_PASSWORD="$(jq -r '.credentials.ios_distribution_certificate_password // empty' "$CREDS")"
          IOS_PROFILE_BASE64="$(jq -r '.credentials.ios_appstore_provisioning_profile_base64 // empty' "$CREDS")"
          KEYCHAIN_PASSWORD="$(jq -r '.credentials.ios_ci_keychain_password // empty' "$CREDS")"
          test -n "$IOS_CERTIFICATE_BASE64"
          test -n "$IOS_CERTIFICATE_PASSWORD"
          test -n "$IOS_PROFILE_BASE64"
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-temporary-ci-keychain}"

          CERT_PATH="$RUNNER_TEMP/ios_distribution.p12"
          PROFILE_DIR="$RUNNER_TEMP/profiles"
          PROFILE_PATH="$PROFILE_DIR/RistakAppStoreCI.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/ristak_appstore.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          mkdir -p "$PROFILE_DIR"
          printf '%s' "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          printf '%s' "$IOS_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          IOS_SIGNING_IDENTITY_LINE="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -nE 's/^[[:space:]]*[0-9]+[)][[:space:]]+([A-F0-9]+)[[:space:]]+"((Apple|iOS) Distribution:.*)"$/\1|\2/p' | head -n 1)"
          IOS_CERT_SHA1="${IOS_SIGNING_IDENTITY_LINE%%|*}"
          IOS_SIGNING_IDENTITY="${IOS_SIGNING_IDENTITY_LINE#*|}"
          if [ -z "$IOS_SIGNING_IDENTITY" ]; then
            echo "No Apple Distribution signing identity with private key was imported from the .p12 certificate."
            exit 1
          fi
          test -n "$IOS_CERT_SHA1"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          IOS_PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print UUID' "$PROFILE_PLIST")"
          IOS_PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print Name' "$PROFILE_PLIST")"
          IOS_PROFILE_TEAM_ID="$(/usr/libexec/PlistBuddy -c 'Print TeamIdentifier:0' "$PROFILE_PLIST")"
          IOS_PROFILE_APP_ID="$(/usr/libexec/PlistBuddy -c 'Print Entitlements:application-identifier' "$PROFILE_PLIST")"
          IOS_PROFILE_GET_TASK_ALLOW="$(/usr/libexec/PlistBuddy -c 'Print Entitlements:get-task-allow' "$PROFILE_PLIST" 2>/dev/null || true)"
          IOS_PROFILE_IS_XCODE_MANAGED="$(/usr/libexec/PlistBuddy -c 'Print IsXcodeManaged' "$PROFILE_PLIST" 2>/dev/null || true)"

          test -n "$IOS_PROFILE_UUID"
          test -n "$IOS_PROFILE_NAME"
          if [ "$IOS_PROFILE_TEAM_ID" != "$APPLE_TEAM_ID" ]; then
            echo "Provisioning profile team '$IOS_PROFILE_TEAM_ID' does not match '$APPLE_TEAM_ID'."
            exit 1
          fi
          if [ "$IOS_PROFILE_APP_ID" != "${APPLE_TEAM_ID}.${APP_BUNDLE_ID}" ]; then
            echo "Provisioning profile app id '$IOS_PROFILE_APP_ID' does not match '${APPLE_TEAM_ID}.${APP_BUNDLE_ID}'."
            exit 1
          fi
          if [ "$IOS_PROFILE_GET_TASK_ALLOW" = "true" ]; then
            echo "Provisioning profile is a development profile; App Store builds require a distribution profile."
            exit 1
          fi
          if [ "$IOS_PROFILE_IS_XCODE_MANAGED" != "true" ]; then
            case "$IOS_PROFILE_NAME" in
              "iOS Team "*|"XC "*)
                IOS_PROFILE_IS_XCODE_MANAGED="true"
                ;;
            esac
          fi
          if [ "$IOS_PROFILE_IS_XCODE_MANAGED" = "true" ]; then
            IOS_SIGNING_STYLE="automatic"
          else
            IOS_SIGNING_STYLE="manual"
          fi
          export IOS_CERT_SHA1 IOS_SIGNING_IDENTITY PROFILE_PLIST
          python3 - <<'PY'
          import hashlib
          import os
          import plistlib
          import sys

          with open(os.environ["PROFILE_PLIST"], "rb") as file:
              profile = plistlib.load(file)

          expected = os.environ["IOS_CERT_SHA1"].replace(":", "").upper()
          profile_hashes = {
              hashlib.sha1(certificate).hexdigest().upper()
              for certificate in profile.get("DeveloperCertificates", [])
          }

          if profile.get("ProvisionedDevices"):
              print("Provisioning profile contains provisioned devices; App Store builds require an App Store Connect profile, not Ad Hoc.")
              sys.exit(1)

          if expected not in profile_hashes:
              profile_name = profile.get("Name", "unknown")
              identity = os.environ["IOS_SIGNING_IDENTITY"]
              print(f"Provisioning profile '{profile_name}' does not include the imported signing certificate '{identity}'.")
              print("Regenerate/download the App Store profile in Apple Developer with that exact Apple Distribution certificate, then update Configuracion > Tiendas moviles with the new .mobileprovision base64.")
              sys.exit(1)
          PY

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${IOS_PROFILE_UUID}.mobileprovision"
          gem install fastlane --no-document
          {
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "IOS_PROFILE_UUID=$IOS_PROFILE_UUID"
            echo "IOS_PROFILE_NAME=$IOS_PROFILE_NAME"
            echo "IOS_SIGNING_IDENTITY=$IOS_SIGNING_IDENTITY"
            echo "IOS_SIGNING_STYLE=$IOS_SIGNING_STYLE"
          } >> "$GITHUB_ENV"

      - name: Set iOS version and build number
        run: |
          cd frontend/ios/App
          xcrun agvtool new-marketing-version "${{ github.event.inputs.ios_version }}"
          xcrun agvtool new-version -all "${{ github.run_number }}"

      - name: Build and sync Capacitor iOS
        run: npm run mobile:sync:ios --prefix frontend

      - name: Archive iOS app
        run: |
          cd frontend
          ruby - <<'RUBY'
          require "xcodeproj"

          project = Xcodeproj::Project.open("ios/App/App.xcodeproj")
          target = project.targets.find { |candidate| candidate.name == "App" }
          raise "Target App not found" unless target

          release = target.build_configurations.find { |configuration| configuration.name == "Release" }
          raise "Release configuration not found for App target" unless release

          settings = release.build_settings
          settings["CODE_SIGN_IDENTITY"] = ENV.fetch("IOS_SIGNING_IDENTITY")
          settings["DEVELOPMENT_TEAM"] = ENV.fetch("APPLE_TEAM_ID")

          case ENV.fetch("IOS_SIGNING_STYLE")
          when "automatic"
            settings["CODE_SIGN_STYLE"] = "Automatic"
            settings.delete("PROVISIONING_PROFILE")
            settings.delete("PROVISIONING_PROFILE_SPECIFIER")
          when "manual"
            settings["CODE_SIGN_STYLE"] = "Manual"
            settings["PROVISIONING_PROFILE"] = ENV.fetch("IOS_PROFILE_UUID")
            settings["PROVISIONING_PROFILE_SPECIFIER"] = ENV.fetch("IOS_PROFILE_NAME")
          else
            raise "Unsupported IOS_SIGNING_STYLE=#{ENV.fetch('IOS_SIGNING_STYLE')}"
          end

          project.save
          RUBY

          archive_args=(
            -project ios/App/App.xcodeproj
            -scheme App
            -configuration Release
            -sdk iphoneos
            -destination 'generic/platform=iOS'
            -archivePath ios/build/RistakChat.xcarchive
            "OTHER_CODE_SIGN_FLAGS=--keychain $KEYCHAIN_PATH"
          )
          if [ "$IOS_SIGNING_STYLE" = "automatic" ]; then
            archive_args+=(
              -allowProvisioningUpdates
              -authenticationKeyPath "$ASC_KEY_PATH"
              -authenticationKeyID "$ASC_KEY_ID"
              -authenticationKeyIssuerID "$ASC_ISSUER_ID"
            )
          fi
          xcodebuild "${archive_args[@]}" archive

      - name: Export IPA
        run: |
          python3 - <<'PY'
          import os
          import plistlib

          signing_style = os.environ.get("IOS_SIGNING_STYLE", "manual")
          options = {
              "destination": "export",
              "manageAppVersionAndBuildNumber": False,
              "method": "app-store-connect",
              "signingStyle": signing_style,
              "stripSwiftSymbols": True,
              "teamID": os.environ["APPLE_TEAM_ID"],
              "uploadSymbols": True,
          }
          if signing_style == "manual":
              options["provisioningProfiles"] = {
                  os.environ["APP_BUNDLE_ID"]: os.environ["IOS_PROFILE_NAME"],
              }
              options["signingCertificate"] = os.environ["IOS_SIGNING_IDENTITY"]
          with open(os.path.join(os.environ["RUNNER_TEMP"], "ExportOptions-AppStore-CI.plist"), "wb") as file:
              plistlib.dump(options, file)
          PY
          cd frontend
          export_args=(
            -exportArchive
            -archivePath ios/build/RistakChat.xcarchive
            -exportPath ios/build/AppStore-CI
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions-AppStore-CI.plist"
          )
          if [ "$IOS_SIGNING_STYLE" = "automatic" ]; then
            export_args+=(
              -allowProvisioningUpdates
              -authenticationKeyPath "$ASC_KEY_PATH"
              -authenticationKeyID "$ASC_KEY_ID"
              -authenticationKeyIssuerID "$ASC_ISSUER_ID"
            )
          fi
          xcodebuild "${export_args[@]}"

      - name: Upload to App Store Connect
        env:
          SUBMIT_FOR_REVIEW: ${{ github.event.inputs.submit_for_review }}
        run: |
          IPA_PATH="frontend/ios/build/AppStore-CI/App.ipa"
          if [ "$SUBMIT_FOR_REVIEW" = "true" ]; then
            fastlane deliver \
              --api_key_path "$RUNNER_TEMP/appstore/api_key.json" \
              --app_identifier "$APP_BUNDLE_ID" \
              --ipa "$IPA_PATH" \
              --skip_metadata true \
              --skip_screenshots true \
              --submit_for_review true \
              --automatic_release false \
              --force true
          else
            fastlane pilot upload \
              --api_key_path "$RUNNER_TEMP/appstore/api_key.json" \
              --app_identifier "$APP_BUNDLE_ID" \
              --ipa "$IPA_PATH" \
              --skip_waiting_for_build_processing true
          fi

      - name: Notify installer
        if: always()
        env:
          INSTALLER_URL: ${{ github.event.inputs.installer_url }}
        run: |
          MOBILE_RELEASE_TOKEN="$(jq -r '.inputs.mobile_release_token // empty' "$GITHUB_EVENT_PATH")"
          echo "::add-mask::$MOBILE_RELEASE_TOKEN"
          if [ -z "$INSTALLER_URL" ] || [ -z "$MOBILE_RELEASE_TOKEN" ]; then
            exit 0
          fi
          STATUS="${{ job.status }}"
          jq -n \
            --arg platform ios \
            --arg store app_store \
            --arg status "$STATUS" \
            --arg version "${{ github.event.inputs.ios_version }}" \
            --arg build_number "${{ github.run_number }}" \
            --arg commit "${{ github.sha }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson submit_for_review ${{ github.event.inputs.submit_for_review }} \
            '{platform:$platform, store:$store, status:$status, version:$version, build_number:$build_number, commit:$commit, branch:$branch, run_url:$run_url, submit_for_review:$submit_for_review}' \
            | curl --fail-with-body -sS -X POST "${INSTALLER_URL%/}/api/webhooks/mobile-release" \
              -H "x-mobile-release-token: $MOBILE_RELEASE_TOKEN" \
              -H "Content-Type: application/json" \
              -d @-

  android:
    name: Android Play Store
    if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Fetch Android store credentials
        env:
          INSTALLER_URL: ${{ github.event.inputs.installer_url }}
        run: |
          MOBILE_RELEASE_TOKEN="$(jq -r '.inputs.mobile_release_token // empty' "$GITHUB_EVENT_PATH")"
          echo "::add-mask::$MOBILE_RELEASE_TOKEN"
          test -n "$INSTALLER_URL"
          test -n "$MOBILE_RELEASE_TOKEN"
          curl --fail-with-body -sS -X POST "${INSTALLER_URL%/}/api/webhooks/mobile-release/credentials" \
            -H "Content-Type: application/json" \
            -H "x-mobile-release-token: $MOBILE_RELEASE_TOKEN" \
            -d '{"platform":"android"}' \
            > "$RUNNER_TEMP/mobile-android-credentials.json"

      - name: Install Android signing key
        run: |
          CREDS="$RUNNER_TEMP/mobile-android-credentials.json"
          ANDROID_KEYSTORE_BASE64="$(jq -r '.credentials.android_release_keystore_base64' "$CREDS")"
          ANDROID_STORE_PASSWORD="$(jq -r '.credentials.android_release_store_password' "$CREDS")"
          ANDROID_KEY_ALIAS="$(jq -r '.credentials.android_release_key_alias' "$CREDS")"
          ANDROID_KEY_PASSWORD="$(jq -r '.credentials.android_release_key_password' "$CREDS")"
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_STORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > frontend/android/app/release.keystore
          cat > frontend/android/app/keystore.properties <<PROPS
          storeFile=release.keystore
          storePassword=$ANDROID_STORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          PROPS

      - name: Build Android App Bundle
        run: |
          npm run mobile:sync:android --prefix frontend
          cd frontend/android
          ./gradlew bundleRelease \
            -PciVersionCode="${{ github.run_number }}" \
            -PciVersionName="${{ github.event.inputs.android_version_name }}"

      - name: Upload to Google Play
        env:
          SUBMIT_FOR_REVIEW: ${{ github.event.inputs.submit_for_review }}
        run: |
          CREDS="$RUNNER_TEMP/mobile-android-credentials.json"
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON="$(jq -r '.credentials.google_play_service_account_json' "$CREDS")"
          test -n "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON"
          printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/google-play-service-account.json"
          gem install fastlane --no-document
          RELEASE_STATUS="draft"
          if [ "$SUBMIT_FOR_REVIEW" = "true" ]; then
            RELEASE_STATUS="completed"
          fi
          fastlane supply \
            --json_key "$RUNNER_TEMP/google-play-service-account.json" \
            --package_name "$APP_BUNDLE_ID" \
            --aab frontend/android/app/build/outputs/bundle/release/app-release.aab \
            --track "${{ github.event.inputs.android_track }}" \
            --release_status "$RELEASE_STATUS" \
            --skip_upload_metadata true \
            --skip_upload_changelogs true \
            --skip_upload_images true \
            --skip_upload_screenshots true

      - name: Notify installer
        if: always()
        env:
          INSTALLER_URL: ${{ github.event.inputs.installer_url }}
        run: |
          MOBILE_RELEASE_TOKEN="$(jq -r '.inputs.mobile_release_token // empty' "$GITHUB_EVENT_PATH")"
          echo "::add-mask::$MOBILE_RELEASE_TOKEN"
          if [ -z "$INSTALLER_URL" ] || [ -z "$MOBILE_RELEASE_TOKEN" ]; then
            exit 0
          fi
          STATUS="${{ job.status }}"
          jq -n \
            --arg platform android \
            --arg store play_store \
            --arg status "$STATUS" \
            --arg version "${{ github.event.inputs.android_version_name }}" \
            --arg build_number "${{ github.run_number }}" \
            --arg commit "${{ github.sha }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg track "${{ github.event.inputs.android_track }}" \
            --argjson submit_for_review ${{ github.event.inputs.submit_for_review }} \
            '{platform:$platform, store:$store, status:$status, version:$version, build_number:$build_number, commit:$commit, branch:$branch, run_url:$run_url, track:$track, submit_for_review:$submit_for_review}' \
            | curl --fail-with-body -sS -X POST "${INSTALLER_URL%/}/api/webhooks/mobile-release" \
              -H "x-mobile-release-token: $MOBILE_RELEASE_TOKEN" \
              -H "Content-Type: application/json" \
              -d @-
