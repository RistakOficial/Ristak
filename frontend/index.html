<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/ristak-icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="application-name" content="Ristak" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Ristak" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Ristak</title>
    <script>
      (function () {
        var pathname = window.location.pathname || '/'
        var isLegacyPhoneRoute = pathname === '/phone' || pathname.indexOf('/phone/') === 0
        var isMobileRoute = pathname === '/movil' || pathname.indexOf('/movil/') === 0
        var isPhoneRoute = isMobileRoute || isLegacyPhoneRoute
        var isMobileHomeRoute = pathname === '/movil' || pathname === '/movil/' || pathname === '/phone' || pathname === '/phone/app'
        var title = 'Ristak'
        var themeColor = isPhoneRoute ? '#050505' : '#ffffff'
        var manifest = isMobileHomeRoute
          ? '/manifest.phone-chat.webmanifest'
          : isPhoneRoute
            ? '/manifest.phone.webmanifest'
            : '/manifest.webmanifest'
        var icon = isMobileHomeRoute
          ? '/ristak-chat-home-apple-touch-icon.png'
          : isPhoneRoute
            ? '/ristak-chat-apple-touch-icon.png'
            : '/apple-touch-icon.png'
        var favicon = isMobileHomeRoute
          ? '/ristak-chat-home-icon-192.png'
          : isPhoneRoute
            ? '/ristak-chat-icon-192.png'
            : '/ristak-icon-192.png'

        document.title = title
        document.querySelector('link[rel="icon"]').setAttribute('type', 'image/png')
        document.querySelector('link[rel="icon"]').setAttribute('href', favicon)
        document.querySelector('link[rel="manifest"]').setAttribute('href', manifest)
        document.querySelector('link[rel="apple-touch-icon"]').setAttribute('href', icon)
        document.querySelector('meta[name="theme-color"]').setAttribute('content', themeColor)
        document.querySelector('meta[name="application-name"]').setAttribute('content', title)
        document.querySelector('meta[name="apple-mobile-web-app-title"]').setAttribute('content', title)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
