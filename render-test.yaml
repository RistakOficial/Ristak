# Internal test Blueprint for the `test` branch.
# This variant creates its own Render DB for test data isolation.
services:
  - type: web
    name: ristak-app-test
    env: node
    region: oregon
    branch: test
    buildCommand: |
      (cd backend && npm ci --no-audit --no-fund) &&
      rm -rf frontend/node_modules frontend/.vite frontend/dist &&
      (cd frontend && npm ci --include=dev --include=optional --foreground-scripts --no-audit --no-fund) &&
      echo "VITE_API_URL=https://$RENDER_EXTERNAL_HOSTNAME" > frontend/.env.production &&
      NODE_ENV=production npm run build --prefix frontend
    startCommand: npm start --prefix backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: UTC
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ristak-db-test
          property: connectionString

databases:
  - name: ristak-db-test
    databaseName: ristak_db_test
    user: ristak_user_test
    plan: basic-256mb
    diskSizeGB: 1
    storageAutoscalingEnabled: true
